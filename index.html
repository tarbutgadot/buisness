<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מציג קבצי PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            touch-action: pan-y;
            overflow: hidden;
        }
        
        #page-wrapper {
            position: relative;
            max-width: 100%;
            height: auto;
            max-height: calc(100vh - 120px);
            margin: 0 auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transition: opacity 0.2s ease-in-out;
            display: flex;
        }

        #pdf-render {
            max-width: 100%;
            height: auto;
            max-height: calc(100vh - 120px);
            display: block;
            border-radius: 0.25rem;
        }

        .pdf-link {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
        }

        .loader {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col h-screen font-sans text-gray-800">

    <main class="flex-grow flex items-center justify-center p-2 relative w-full h-full overflow-hidden" id="canvas-container">
        <div id="loading-bar" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-10">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-gray-600 font-medium">טוען את המסמך...</p>
        </div>
        
        <div id="error-message" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-20 p-6 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-500 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <h2 class="text-xl font-bold mb-2">לא הצלחנו לטעון את הקובץ</h2>
            <p class="text-gray-600 mb-6">קרתה שגיאה בתקשורת מול השרת.</p>
            <a href="https://www.dropbox.com/scl/fi/03xukiezeoeu6dsjioyfw/5.2026.pdf?rlkey=7zoyok447f9eors5m2o6oepqx&dl=0" target="_blank" class="px-6 py-3 bg-blue-600 text-white rounded-lg shadow font-medium hover:bg-blue-700">
                פתח את הקובץ בכרטיסייה חדשה
            </a>
        </div>

        <div id="page-wrapper" class="bg-white rounded">
            <canvas id="pdf-render"></canvas>
            <div id="annotation-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 p-4 flex justify-between items-center z-30">
        <button id="next-page" class="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-100 transition-colors font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            הבא
        </button>

        <span class="text-sm font-medium text-gray-600">
            עמוד <span id="page-num">0</span> מתוך <span id="page-count">0</span>
        </span>

        <button id="prev-page" class="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-100 transition-colors font-medium">
            הקודם
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
        </button>
    </footer>

    <script>
        const originalUrl = 'https://dl.dropboxusercontent.com/scl/fi/03xukiezeoeu6dsjioyfw/5.2026.pdf?rlkey=7zoyok447f9eors5m2o6oepqx';
        
        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const scale = 1.5,
              canvas = document.querySelector('#pdf-render'),
              ctx = canvas.getContext('2d'),
              container = document.querySelector('#canvas-container');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const renderPage = num => {
            pageIsRendering = true;
            document.querySelector('#page-wrapper').style.opacity = 0.5;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: ctx,
                    viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    document.querySelector('#page-wrapper').style.opacity = 1;

                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });

                const annotationLayer = document.querySelector('#annotation-layer');
                annotationLayer.innerHTML = ''; 

                page.getAnnotations().then(annotations => {
                    annotations.forEach(anno => {
                        if (anno.subtype === 'Link') {
                            const rect = viewport.convertToViewportRectangle(anno.rect);
                            const minX = Math.min(rect[0], rect[2]);
                            const maxX = Math.max(rect[0], rect[2]);
                            const minY = Math.min(rect[1], rect[3]);
                            const maxY = Math.max(rect[1], rect[3]);

                            const linkDiv = document.createElement('div');
                            linkDiv.className = 'pdf-link';
                            
                            linkDiv.style.left = (minX / viewport.width * 100) + '%';
                            linkDiv.style.top = (minY / viewport.height * 100) + '%';
                            linkDiv.style.width = ((maxX - minX) / viewport.width * 100) + '%';
                            linkDiv.style.height = ((maxY - minY) / viewport.height * 100) + '%';

                            if (anno.dest) {
                                linkDiv.addEventListener('click', () => {
                                    let destPromise = typeof anno.dest === 'string' ? pdfDoc.getDestination(anno.dest) : Promise.resolve(anno.dest);
                                    
                                    destPromise.then(destArray => {
                                        if (destArray && destArray[0]) {
                                            pdfDoc.getPageIndex(destArray[0]).then(pageIndex => {
                                                pageNum = pageIndex + 1;
                                                queueRenderPage(pageNum);
                                            });
                                        }
                                    });
                                });
                            } else if (anno.url) {
                                linkDiv.addEventListener('click', () => window.open(anno.url, '_blank'));
                            }

                            annotationLayer.appendChild(linkDiv);
                        }
                    });
                });

                document.querySelector('#page-num').textContent = num;
                
                document.querySelector('#prev-page').disabled = (num <= 1);
                document.querySelector('#next-page').disabled = (num >= pdfDoc.numPages);
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) {
                pageNumIsPending = num;
            } else {
                renderPage(num);
            }
        };

        const showPrevPage = () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        };

        const showNextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        };

        // פונקציה חכמה לטעינת הקובץ עם נסיונות גיבוי מול חסימות
        async function loadPdf() {
            const urlsToTry = [
                originalUrl, // קודם מנסים ישירות
                'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl),
                'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(originalUrl)
            ];

            for (let i = 0; i < urlsToTry.length; i++) {
                try {
                    const loadingTask = pdfjsLib.getDocument({
                        url: urlsToTry[i],
                        disableRange: true,   // קריטי למניעת שגיאות 403 בשימוש עם פרוקסי
                        disableStream: true
                    });
                    pdfDoc = await loadingTask.promise;
                    
                    document.querySelector('#page-count').textContent = pdfDoc.numPages;
                    document.querySelector('#loading-bar').style.display = 'none';
                    renderPage(pageNum);
                    return; // יציאה מהלולאה במקרה של הצלחה
                } catch (err) {
                    console.warn('Failed to load from', urlsToTry[i], err);
                }
            }
            
            // אם כל הנסיונות נכשלו
            document.querySelector('#loading-bar').style.display = 'none';
            document.querySelector('#error-message').classList.remove('hidden');
        }

        loadPdf();

        document.querySelector('#prev-page').addEventListener('click', showPrevPage);
        document.querySelector('#next-page').addEventListener('click', showNextPage);

        let touchstartX = 0;
        let touchendX = 0;

        container.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, { passive: true });

        container.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchendX - touchstartX;
            const minSwipeDistance = 50;

            if (swipeDistance < -minSwipeDistance) {
                showNextPage(); // החלקה שמאלה - עמוד הבא
            }
            if (swipeDistance > minSwipeDistance) {
                showPrevPage(); // החלקה ימינה - עמוד קודם
            }
        }
        
        window.addEventListener('resize', () => {
            if(pdfDoc) {
               queueRenderPage(pageNum); 
            }
        });
    </script>
</body>
</html>
